<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="gGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#081b2e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#gGrad)"/>
  <!-- Globe outline -->
  <g transform="translate(400,280)" opacity="0.1" stroke="#34d399" stroke-width="2" fill="none">
    <circle cx="0" cy="0" r="160"/>
    <ellipse cx="0" cy="0" rx="60" ry="160"/>
    <ellipse cx="0" cy="0" rx="160" ry="60"/>
    <line x1="-160" y1="0" x2="160" y2="0"/>
    <line x1="0" y1="-160" x2="0" y2="160"/>
  </g>
  <!-- Connection points -->
  <g opacity="0.2" fill="#34d399">
    <circle cx="400" cy="200" r="3"/>
    <circle cx="300" cy="280" r="3"/>
    <circle cx="500" cy="280" r="3"/>
    <circle cx="350" cy="340" r="3"/>
    <circle cx="450" cy="360" r="3"/>
    <circle cx="400" cy="420" r="3"/>
  </g>
  <!-- Connection lines -->
  <g opacity="0.08" stroke="#34d399" stroke-width="1" fill="none">
    <line x1="400" y1="200" x2="300" y2="280"/>
    <line x1="400" y1="200" x2="500" y2="280"/>
    <line x1="300" y1="280" x2="350" y2="340"/>
    <line x1="500" y1="280" x2="450" y2="360"/>
    <line x1="350" y1="340" x2="400" y2="420"/>
    <line x1="450" y1="360" x2="400" y2="420"/>
  </g>
  <!-- Outer rings -->
  <g opacity="0.05" fill="none" stroke="#34d399" stroke-width="1">
    <circle cx="400" cy="280" r="200"/>
    <circle cx="400" cy="280" r="220"/>
  </g>
</svg>