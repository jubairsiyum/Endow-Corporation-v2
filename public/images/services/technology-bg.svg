<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="techGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#techGrad)"/>
  <!-- Circuit board pattern -->
  <g opacity="0.1" stroke="#fbbf24" stroke-width="1.5" fill="none">
    <path d="M50,100 L150,100 L150,200 L250,200"/>
    <path d="M100,300 L200,300 L200,350"/>
    <path d="M550,80 L550,150 L450,150"/>
    <path d="M650,200 L650,350 L550,350"/>
    <path d="M300,450 L400,450 L400,500 L500,500"/>
    <path d="M700,400 L700,500 L600,500"/>
  </g>
  <!-- Circuit nodes -->
  <g opacity="0.3">
    <circle cx="150" cy="100" r="4" fill="#fbbf24"/>
    <circle cx="250" cy="200" r="4" fill="#fbbf24"/>
    <circle cx="450" cy="150" r="3" fill="#f59e0b"/>
    <circle cx="550" cy="350" r="4" fill="#fbbf24"/>
    <circle cx="400" cy="450" r="3" fill="#f59e0b"/>
    <circle cx="600" cy="500" r="4" fill="#fbbf24"/>
  </g>
  <!-- CPU chip -->
  <g transform="translate(400,250)" opacity="0.08">
    <rect x="-40" y="-40" width="80" height="80" rx="8" fill="none" stroke="#ffffff" stroke-width="3"/>
    <rect x="-20" y="-20" width="40" height="40" rx="4" fill="none" stroke="#ffffff" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="8" fill="none" stroke="#ffffff" stroke-width="1"/>
    <!-- Pins -->
    <line x1="-30" y1="-45" x2="-30" y2="-55" stroke="#ffffff" stroke-width="2"/>
    <line x1="0" y1="-45" x2="0" y2="-55" stroke="#ffffff" stroke-width="2"/>
    <line x1="30" y1="-45" x2="30" y2="-55" stroke="#ffffff" stroke-width="2"/>
    <line x1="-30" y1="45" x2="-30" y2="55" stroke="#ffffff" stroke-width="2"/>
    <line x1="0" y1="45" x2="0" y2="55" stroke="#ffffff" stroke-width="2"/>
    <line x1="30" y1="45" x2="30" y2="55" stroke="#ffffff" stroke-width="2"/>
  </g>
  <!-- Data flow dots -->
  <g opacity="0.2" fill="#fbbf24">
    <circle cx="200" cy="150" r="1.5"/>
    <circle cx="350" cy="100" r="1.5"/>
    <circle cx="500" cy="200" r="1.5"/>
    <circle cx="600" cy="300" r="1.5"/>
    <circle cx="300" cy="400" r="1.5"/>
  </g>
</svg>