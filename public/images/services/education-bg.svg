<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="eGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0a1a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#eGrad)"/>
  <!-- Abstract book / knowledge stacks -->
  <g opacity="0.1" stroke="#a78bfa" stroke-width="2" fill="none">
    <rect x="150" y="180" width="120" height="160" rx="8"/>
    <rect x="170" y="200" width="80" height="120" rx="4"/>
    <rect x="310" y="200" width="100" height="140" rx="6"/>
    <rect x="330" y="220" width="60" height="100" rx="4"/>
    <rect x="470" y="170" width="110" height="170" rx="8"/>
    <rect x="490" y="190" width="70" height="130" rx="4"/>
  </g>
  <!-- Graduation cap -->
  <g transform="translate(650,350)" opacity="0.06" fill="#ffffff">
    <path d="M0,-20 L-20,-10 L0,-12 L20,-10 Z"/>
    <rect x="-5" y="-12" width="10" height="15" rx="2"/>
  </g>
  <!-- Knowledge rays -->
  <g opacity="0.04" stroke="#a78bfa" stroke-width="1">
    <line x1="400" y1="80" x2="200" y2="250"/>
    <line x1="400" y1="80" x2="300" y2="280"/>
    <line x1="400" y1="80" x2="500" y2="280"/>
    <line x1="400" y1="80" x2="600" y2="250"/>
  </g>
  <!-- Dots -->
  <g opacity="0.15" fill="#a78bfa">
    <circle cx="100" cy="100" r="2"/>
    <circle cx="700" cy="150" r="2"/>
    <circle cx="150" cy="450" r="2"/>
    <circle cx="650" cy="500" r="2"/>
    <circle cx="400" cy="520" r="2"/>
  </g>
</svg>